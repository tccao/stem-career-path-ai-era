applications:
  - appRoot: v3/frontend
    customHeaders:
      - pattern: '**/*'
        headers:
          - key: Strict-Transport-Security
            value: 'max-age=31536000; includeSubDomains; preload'
          - key: Content-Security-Policy
            value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com https://firebaseappcheck.googleapis.com https://recaptchaenterprise.googleapis.com https://us-central1-code4good-stem-career-path.cloudfunctions.net https://www.google.com; frame-src https://code4good-stem-career-path.firebaseapp.com https://www.google.com; upgrade-insecure-requests"
          - key: X-Content-Type-Options
            value: nosniff
          - key: X-Frame-Options
            value: DENY
          - key: Referrer-Policy
            value: strict-origin-when-cross-origin
          - key: Permissions-Policy
            value: 'camera=(), microphone=(), geolocation=(), payment=(), usb=()'
          - key: Cross-Origin-Opener-Policy
            value: same-origin
          - key: Cross-Origin-Resource-Policy
            value: same-origin
      - pattern: '/assets/*'
        headers:
          - key: Cache-Control
            value: 'public, max-age=31536000, immutable'
      - pattern: '/*.html'
        headers:
          - key: Cache-Control
            value: 'no-cache, no-store, must-revalidate, s-maxage=0'
      - pattern: '/'
        headers:
          - key: Cache-Control
            value: 'no-cache, no-store, must-revalidate, s-maxage=0'
      - pattern: '/codeforgood-logo.png'
        headers:
          - key: Cache-Control
            value: 'public, max-age=604800, s-maxage=31536000'
