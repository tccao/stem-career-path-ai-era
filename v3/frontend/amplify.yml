# AWS Amplify Hosting build spec.
# In the Amplify console, set the app root / monorepo path to: v3/frontend
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
