# Local AWS cloud for the Code For Good V2 demo.
# One MIT-licensed container emulating DynamoDB, Cognito, SQS, S3 and SES on a single
# endpoint (http://localhost:4566) — the same services the production design uses
# (docs/Architecture-Design.md §4). This is how the demo's cloud dependencies are made
# reproducible and visible in the repo: clone, `docker compose up`, done.
#
#   Start:   docker compose -f demo/docker-compose.yml up -d
#   Health:  curl http://localhost:4566/_ministack/health
#   Reset:   curl -X POST http://localhost:4566/_ministack/reset     (clean state for tests)
#   Stop:    docker compose -f demo/docker-compose.yml down
#
# The app points at this via AWS_ENDPOINT_URL in demo/.env (see .env.example). Swapping to
# real AWS later is a one-line endpoint change — see demo/docs/ADR-001 and ADR-002.

services:
  ministack:
    image: ministackorg/ministack:latest   # pin to a release tag before relying on it in CI
    container_name: cfg-demo-cloud
    ports:
      - "4566:4566"                         # unified AWS endpoint (all services, one port)
    environment:
      - GATEWAY_PORT=4566
      - S3_PERSIST=1                         # keep S3 objects across restarts
    volumes:
      - ministack-data:/data
    healthcheck:
      # MiniStack also exposes /_localstack/health and /health for compatibility.
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_ministack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ministack-data:
