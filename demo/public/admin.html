<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code For Good · Admin Dashboard (Demo)</title>
  <style>
    :root {
      --cfg-purple: #6a0dad;
      --cfg-purple-dark: #4b0082;
      --cfg-lavender: #b19cd9;
      --bg: #f7f4fb;
      --card: #ffffff;
      --line: #e7e0f0;
      --ink: #2d2d2d;
      --muted: #6b6577;
      --ok: #1b8a4b;
      --warn: #b26a00;
      --bad: #b3261e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--ink); }
    a { color: var(--cfg-purple); }
    .topbar { display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; color: #fff;
      background: linear-gradient(90deg, var(--cfg-purple-dark), var(--cfg-purple)); }
    .topbar .brand { font-weight: 700; letter-spacing: .2px; }
    .topbar .brand small { display:block; font-weight:400; opacity:.85; font-size:.72rem; }
    .topbar .who { font-size: .85rem; opacity: .95; }
    .topbar button { background: rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.35);
      border-radius:6px; padding:6px 12px; cursor:pointer; }
    .wrap { max-width: 1180px; margin: 22px auto; padding: 0 18px; }
    .hidden { display: none !important; }

    /* login */
    .login-card { max-width: 380px; margin: 8vh auto; background: var(--card); border:1px solid var(--line);
      border-radius: 14px; padding: 28px; box-shadow: 0 6px 24px rgba(75,0,130,.08); }
    .login-card h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--cfg-purple-dark); }
    .login-card p { margin: 0 0 18px; color: var(--muted); font-size: .9rem; }
    label { display:block; font-size:.8rem; color:var(--muted); margin: 12px 0 5px; }
    input, select { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:.95rem; }
    .btn { background: var(--cfg-purple); color:#fff; border:none; border-radius:8px; padding:10px 16px;
      font-size:.9rem; cursor:pointer; }
    .btn:hover { background: var(--cfg-purple-dark); }
    .btn.sec { background:#fff; color:var(--cfg-purple); border:1px solid var(--cfg-lavender); }
    .btn.warn { background:#fff; color:var(--warn); border:1px solid #e7c9a0; }
    .btn.bad { background:#fff; color:var(--bad); border:1px solid #e7b0ac; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .hint { font-size:.78rem; color:var(--muted); margin-top:10px; }

    /* kpis */
    .kpis { display:grid; grid-template-columns: repeat(6, 1fr); gap:12px; margin-bottom:20px; }
    .kpi { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; text-align:center; }
    .kpi .n { font-size:1.5rem; font-weight:700; color:var(--cfg-purple-dark); }
    .kpi .l { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-top:4px; }

    .tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .tab { padding:7px 13px; border-radius:999px; border:1px solid var(--line); background:#fff;
      cursor:pointer; font-size:.82rem; color:var(--muted); }
    .tab.active { background:var(--cfg-purple); color:#fff; border-color:var(--cfg-purple); }

    .cols { display:grid; grid-template-columns: 1.1fr 1fr; gap:18px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
    .panel h2 { font-size:.95rem; margin:0 0 12px; color:var(--cfg-purple-dark); }
    .row { display:flex; justify-content:space-between; align-items:center; padding:10px 8px;
      border-bottom:1px solid var(--line); cursor:pointer; border-radius:6px; }
    .row:hover { background:#faf7ff; }
    .row .nm { font-weight:600; font-size:.9rem; }
    .row .sub { font-size:.76rem; color:var(--muted); }
    .pill { font-size:.68rem; padding:3px 9px; border-radius:999px; background:#f0e9fa; color:var(--cfg-purple-dark); white-space:nowrap; }
    .pill.ACTIVE { background:#e3f5ea; color:var(--ok); }
    .pill.REJECTED, .pill.REVOKED { background:#fde9e7; color:var(--bad); }
    .pill.EXPIRED { background:#fff0db; color:var(--warn); }
    .empty { color:var(--muted); font-size:.85rem; padding:14px 6px; }

    .detail .field { display:flex; justify-content:space-between; padding:6px 0; font-size:.85rem; border-bottom:1px dashed var(--line); }
    .detail .field span:first-child { color:var(--muted); }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
    .actions .btn { font-size:.82rem; padding:8px 12px; }
    .timeline { margin-top:14px; }
    .timeline .ev { font-size:.78rem; padding:5px 0; border-bottom:1px dashed var(--line); color:var(--muted); }
    .timeline .ev b { color:var(--ink); }
    .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--cfg-purple-dark);
      color:#fff; padding:10px 18px; border-radius:8px; font-size:.85rem; opacity:0; transition:opacity .2s; }
    .toast.show { opacity:1; }
    .members-wrap { margin-top:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:9px 8px; font-size:.83rem; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; font-size:.72rem; text-transform:uppercase; }
    @media (max-width: 880px) { .cols { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(3,1fr); } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Code For Good · Admin <small>V2 demo — vetted-access platform</small></div>
    <div id="session" class="hidden"><span class="who" id="who"></span>
      <button id="logoutBtn">Log out</button></div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="wrap">
    <div class="login-card">
      <h1>Admin sign in</h1>
      <p>Demo authentication (stands in for Cognito). Use the seeded admin account.</p>
      <label for="email">Email</label>
      <input id="email" type="email" value="admin@codeforgood.us" />
      <label for="password">Password</label>
      <input id="password" type="password" value="admin1234" />
      <div style="margin-top:16px;"><button class="btn" id="loginBtn" style="width:100%;">Sign in</button></div>
      <div class="hint" id="loginMsg"></div>
      <div class="hint">Seeded admin: <b>admin@codeforgood.us</b> / <b>admin1234</b></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="wrap hidden">
    <div class="kpis" id="kpis"></div>

    <div class="tabs" id="tabs"></div>

    <div class="cols">
      <div class="panel">
        <h2 id="queueTitle">Applications</h2>
        <div id="queue"></div>
      </div>
      <div class="panel detail">
        <h2>Details</h2>
        <div id="detail"><div class="empty">Select an application from the queue.</div></div>
      </div>
    </div>

    <div class="panel members-wrap">
      <h2>Members</h2>
      <div id="members"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    const API = '/api/v1';
    let token = sessionStorage.getItem('cfg_admin_token') || null;
    let currentId = null;

    const $ = (id) => document.getElementById(id);
    const toast = (msg) => { const t = $('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200); };

    async function api(path, { method = 'GET', body } = {}) {
      const res = await fetch(API + path, {
        method,
        headers: { 'content-type': 'application/json', ...(token ? { authorization: `Bearer ${token}` } : {}) },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 401) { logout(); throw new Error('unauthorized'); }
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw Object.assign(new Error(json.message || json.error || res.statusText), { code: json.error, status: res.status });
      return json;
    }

    // ---- auth ----
    async function login() {
      $('loginMsg').textContent = '';
      try {
        const r = await api('/auth/login', { method: 'POST', body: { email: $('email').value, password: $('password').value } });
        token = r.token; sessionStorage.setItem('cfg_admin_token', token);
        showApp(r.user);
      } catch (e) { $('loginMsg').textContent = 'Sign-in failed: ' + e.message; }
    }
    function logout() {
      token = null; sessionStorage.removeItem('cfg_admin_token');
      $('app').classList.add('hidden'); $('session').classList.add('hidden'); $('login').classList.remove('hidden');
    }

    function showApp(user) {
      $('login').classList.add('hidden'); $('app').classList.remove('hidden'); $('session').classList.remove('hidden');
      $('who').textContent = (user?.email || 'admin') + ' · admin';
      renderTabs(); refresh();
    }

    // ---- queue tabs ----
    const STATUSES = [
      ['SUBMITTED', 'Submitted'], ['INTERVIEW_SCHEDULED', 'Interview'],
      ['DONATION_REQUIRED', 'Donation req.'], ['DONATION_CONFIRMED', 'Donation conf.'],
      ['APPROVED_BENEFICIARY', 'Approved'],
    ];
    let activeStatus = 'SUBMITTED';
    function renderTabs() {
      $('tabs').innerHTML = STATUSES.map(([s, l]) =>
        `<div class="tab ${s === activeStatus ? 'active' : ''}" data-s="${s}">${l}</div>`).join('');
      $('tabs').querySelectorAll('.tab').forEach((t) =>
        t.onclick = () => { activeStatus = t.dataset.s; renderTabs(); loadQueue(); });
    }

    async function refresh() { await Promise.all([loadOverview(), loadQueue(), loadMembers()]); }

    async function loadOverview() {
      const { counts } = await api('/admin/overview');
      const cards = [
        ['SUBMITTED', 'Submitted'], ['INTERVIEW_SCHEDULED', 'Interview'],
        ['DONATION_REQUIRED', 'Donation req'], ['APPROVED_BENEFICIARY', 'Approved'],
        ['DONATION_CONFIRMED', 'Confirmed'], ['ACTIVE_MEMBERS', 'Active members'],
      ];
      $('kpis').innerHTML = cards.map(([k, l]) =>
        `<div class="kpi"><div class="n">${counts[k] ?? 0}</div><div class="l">${l}</div></div>`).join('');
    }

    async function loadQueue() {
      $('queueTitle').textContent = 'Applications · ' + (STATUSES.find(s => s[0] === activeStatus)?.[1] || activeStatus);
      const { items } = await api('/admin/applications?status=' + activeStatus);
      if (!items.length) { $('queue').innerHTML = '<div class="empty">No applications in this state.</div>'; return; }
      $('queue').innerHTML = items.map((a) => `
        <div class="row" data-id="${a.applicationId}">
          <div><div class="nm">${esc(a.fullName || '—')}</div>
            <div class="sub">${esc(a.email)} · ${esc(a.preferredTrack || '')}</div></div>
          <span class="pill ${a.status}">${a.status}</span>
        </div>`).join('');
      $('queue').querySelectorAll('.row').forEach((r) => r.onclick = () => openApp(r.dataset.id));
    }

    const ACTIONS = {
      SUBMITTED: [['schedule-interview', 'Schedule interview', 'btn'], ['require-donation', 'Require donation', 'sec'], ['request-info', 'Request info', 'sec']],
      INTERVIEW_SCHEDULED: [['approve', 'Approve (free)', 'btn'], ['require-donation', 'Require donation', 'sec'], ['reject', 'Reject', 'bad'], ['request-info', 'Request info', 'sec']],
      DONATION_REQUIRED: [['confirm-donation', 'Confirm donation', 'btn'], ['request-info', 'Request info', 'sec']],
      DONATION_CONFIRMED: [['provision', 'Provision access', 'btn']],
      APPROVED_BENEFICIARY: [['provision', 'Provision access', 'btn']],
    };

    async function openApp(id) {
      currentId = id;
      const { application: a, audit } = await api('/admin/applications/' + id);
      const f = (k, v) => `<div class="field"><span>${k}</span><span>${esc(v ?? '—')}</span></div>`;
      const acts = (ACTIONS[a.status] || []).map(([act, label, cls]) =>
        `<button class="btn ${cls}" data-act="${act}">${label}</button>`).join('') || '<span class="empty">No actions — terminal state.</span>';
      $('detail').innerHTML = `
        <div class="field"><span>Applicant</span><span><b>${esc(a.fullName)}</b></span></div>
        ${f('Email', a.email)} ${f('Status', a.status)} ${f('Track', a.preferredTrack)}
        ${f('Access basis', a.accessBasis)} ${f('Member ID', a.memberId)} ${f('Submitted', a.createdAt)}
        <div class="actions">${acts}</div>
        <div class="timeline">${(audit || []).map(ev =>
          `<div class="ev"><b>${esc(ev.action)}</b> · ${esc((ev.after && ev.after.status) || '')} <span style="float:right">${esc((ev.ts||'').slice(0,16).replace('T',' '))}</span></div>`).join('')}</div>`;
      $('detail').querySelectorAll('button[data-act]').forEach((b) =>
        b.onclick = () => doAction(id, b.dataset.act));
    }

    async function doAction(id, act) {
      try {
        const body = act === 'reject' ? { reasonCode: 'NOT_ELIGIBLE' }
          : act === 'request-info' ? { reasonCode: 'NEED_PORTFOLIO' } : {};
        const r = await api(`/admin/applications/${id}/${act}`, { method: 'POST', body });
        toast(act === 'provision'
          ? (r.alreadyProvisioned ? 'Already provisioned' : 'Provisioned member ' + (r.memberId || '').slice(0, 8))
          : 'Done: ' + act);
        await refresh(); await openApp(id);
      } catch (e) { toast('Error: ' + e.message); }
    }

    async function loadMembers() {
      const { items } = await api('/admin/members');
      if (!items.length) { $('members').innerHTML = '<div class="empty">No provisioned members yet.</div>'; return; }
      $('members').innerHTML = `<table><thead><tr>
        <th>Name</th><th>Email</th><th>Basis</th><th>Path</th><th>Status</th><th>Access ends</th><th></th></tr></thead>
        <tbody>${items.map((m) => `<tr>
          <td>${esc(m.fullName || '—')}</td><td>${esc(m.email)}</td><td>${esc(m.accessBasis || '')}</td>
          <td>${esc(m.path || '')}</td><td><span class="pill ${m.status}">${m.status}</span></td>
          <td>${esc((m.accessEndsAt || '').slice(0, 10))}</td>
          <td>${m.status === 'ACTIVE'
            ? `<button class="btn sec" data-ext="${m.memberId}">Extend</button> <button class="btn bad" data-rev="${m.memberId}">Revoke</button>`
            : ''}</td></tr>`).join('')}</tbody></table>`;
      $('members').querySelectorAll('button[data-ext]').forEach(b => b.onclick = () => memberAction(b.dataset.ext, 'extend', { days: 90 }));
      $('members').querySelectorAll('button[data-rev]').forEach(b => b.onclick = () => memberAction(b.dataset.rev, 'revoke', { reasonCode: 'ADMIN_REVOKE' }));
    }
    async function memberAction(id, act, body) {
      try { await api(`/admin/members/${id}/${act}`, { method: 'POST', body }); toast('Member ' + act + 'd'); await refresh(); }
      catch (e) { toast('Error: ' + e.message); }
    }

    function esc(s) { return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    $('loginBtn').onclick = login;
    $('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    $('logoutBtn').onclick = logout;

    // resume session if token present
    if (token) { api('/auth/me').then(r => showApp(r.user)).catch(() => logout()); }
  </script>
</body>
</html>
