# AWS Amplify Hosting — MONOREPO build spec (must live at the repo root).
# Amplify is configured with app root v3/frontend, so the spec must use the `applications`
# array with `appRoot` (a flat `version/frontend` spec triggers:
#   CustomerError: Monorepo spec provided without "applications" key).
# Commands run relative to appRoot; baseDirectory dist → v3/frontend/dist.
version: 1
applications:
  - appRoot: v3/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - npm ci
        build:
          commands:
            - npm run build:production
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
